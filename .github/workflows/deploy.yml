name: Deploy TaskFlow

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}/taskflow-api
  IMAGE_NAME_FRONTEND: ${{ github.repository }}/taskflow-web

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}

      - name: Extract metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
    # 1. Necesitamos bajar el código en el runner para poder copiar la carpeta 'docker'
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Copiar toda la carpeta "docker" desde el repositorio al VPS
    - name: Copiar archivos de configuracion al VPS
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: ${{ secrets.VPS_SSH_PORT }}
        source: "docker/*"
        target: "/opt/apps/"

    # 3. Entrar al VPS por SSH y levantar toda la arquitectura
    - name: Deploy to VPS
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        password: ${{ secrets.VPS_PASSWORD }}
        port: ${{ secrets.VPS_SSH_PORT }}
        script: |
          echo "🚀 Iniciando despliegue de Infraestructura..."
          
          # Crear las redes de Docker si no existen (el '|| true' evita errores si ya están)
          docker network create proxy || true
          docker network create backend || true
          
          # Entrar a la carpeta donde SCP acaba de subir tus archivos
          cd /opt/apps/docker
          
          # Configuración de seguridad estricta obligatoria para el certificado de Traefik
          touch acme.json
          chmod 600 acme.json
          
          echo "⚙️ Levantando Infraestructura Base (Traefik, DB, Portainer)..."
          docker compose -f docker-compose.traefik.yml up -d
          docker compose -f docker-compose.database.yml up -d
          docker compose -f docker-compose.portainer.yml up -d
          
          echo "📦 Desplegando la Aplicación (Backend y Frontend)..."
          docker compose -f docker-compose.backend.yml pull
          docker compose -f docker-compose.frontend.yml pull
          
          docker compose -f docker-compose.backend.yml up -d --force-recreate
          docker compose -f docker-compose.frontend.yml up -d --force-recreate
          
          # Limpieza
          docker image prune -f
          
          echo "✅ Despliegue total completado con éxito"